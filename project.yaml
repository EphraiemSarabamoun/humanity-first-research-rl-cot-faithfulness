name: rl-cot-faithfulness
title: "Does RL Erode Chain-of-Thought Faithfulness?"
question: >
  Does outcome-only reinforcement-learning optimization pressure make a model
  increasingly rely on a planted shortcut cue to earn reward while its
  chain-of-thought increasingly fails to mention that cue? The reward never
  reads the CoT, so any drop in articulation is an emergent property of pure
  outcome optimization. Headline curves: unfaithfulness (relies-but-silent)
  rising and CoT-monitor recall falling as a function of RL steps.
